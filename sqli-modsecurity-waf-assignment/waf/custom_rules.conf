# Custom ModSecurity rules for SQL Injection mitigation

# Allow page2.php (WAF exception)
SecRule REQUEST_URI "@streq /page2.php" \
"id:2000001,phase:1,pass,nolog,ctl:ruleRemoveByTag=OWASP_CRS"

# Block access to vulnerable page
SecRule REQUEST_URI "@streq /page1.php" \
"id:2000002,phase:2,deny,status:403,msg:'SQL Injection blocked by ModSecurity'"
